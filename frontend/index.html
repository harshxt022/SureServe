<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SureServe — Find Trusted Home Service Professionals</title>
    <meta name="description"
        content="Book top-rated electricians, plumbers, AC technicians and more in minutes. SureServe connects you with verified home service professionals." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet" />

    <style>
        /* ─── Design Tokens ───────────────────────────────── */
        :root {
            --ivory: #FAFAF8;
            --charcoal: #1A1A1A;
            --charcoal-light: #2D2D2D;
            --mid-gray: #6B6B6B;
            --light-gray: #E8E8E4;
            --indigo: #4F46E5;
            --indigo-hover: #4338CA;
            --indigo-glow: rgba(79, 70, 229, 0.15);
            --warm-white: #FFFFFF;
            --section-number: rgba(26, 26, 26, 0.04);
        }

        /* ─── Base ────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--ivory);
            color: var(--charcoal);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }

        ::selection {
            background: var(--indigo);
            color: white;
        }

        /* ─── Scrollbar ───────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--ivory);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 99px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--mid-gray);
        }

        /* ─── Marquee ─────────────────────────────────────── */
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .marquee-track {
            display: flex;
            animation: marquee 30s linear infinite;
            width: max-content;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        /* ─── Stagger Reveal ──────────────────────────────── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── Cursor Glow ─────────────────────────────────── */
        .cursor-glow {
            pointer-events: none;
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--indigo-glow) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        /* ─── Magnetic Button ─────────────────────────────── */
        .magnetic-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ─── Gradient Blob ───────────────────────────────── */
        @keyframes blobRotate {
            0% {
                transform: rotate(0deg) scale(1);
            }

            33% {
                transform: rotate(120deg) scale(1.05);
            }

            66% {
                transform: rotate(240deg) scale(0.95);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .blob {
            animation: blobRotate 20s ease-in-out infinite;
        }

        /* ─── Float animation ─────────────────────────────── */
        @keyframes floatShape {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        .float-shape {
            animation: floatShape 6s ease-in-out infinite;
        }

        /* ─── Soft pulse ──────────────────────────────────── */
        @keyframes softPulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .soft-pulse {
            animation: softPulse 3s ease-in-out infinite;
        }

        /* ─── Hover lift ──────────────────────────────────── */
        .hover-lift {
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease;
        }

        .hover-lift:hover {
            transform: translateY(-6px);
        }

        /* ─── Card accent border ──────────────────────────── */
        .card-accent {
            position: relative;
            overflow: hidden;
        }

        .card-accent::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--indigo);
            transform: scaleY(0);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: bottom;
        }

        .card-accent:hover::before {
            transform: scaleY(1);
            transform-origin: top;
        }

        /* ─── Section number ──────────────────────────────── */
        .section-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 700;
            color: var(--section-number);
            line-height: 1;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
