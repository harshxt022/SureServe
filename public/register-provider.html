<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Signup - SureServe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="/js/theme.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    .font-heading {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>

<body
  class="bg-[#FAFAFC] dark:bg-gray-900 text-gray-800 dark:text-gray-200 antialiased min-h-screen flex flex-col transition-colors duration-300">
  <!-- Minimal Nav -->
  <nav class="w-full p-4 flex justify-between items-center absolute top-0 left-0 right-0 z-10">
    <a href="/" class="flex items-center gap-2 group cursor-pointer text-gray-900 dark:text-white px-4">
      <div
        class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-white shadow-lg group-hover:rotate-12 transition-transform duration-300">
        <i class="fas fa-home text-lg"></i>
      </div>
      <span class="text-2xl font-bold font-heading tracking-tight">SureServe</span>
    </a>
    <button onclick="toggleDarkMode()"
      class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors px-4"
      aria-label="Toggle Dark Mode">
      <i class="theme-toggle-icon fas fa-moon text-xl"></i>
    </button>
  </nav>

  <!-- Register Form -->
  <main class="flex-grow flex items-center justify-center p-4 pt-24 pb-12 relative overflow-hidden">
    <!-- Decorative -->
    <div
      class="absolute -top-[10%] content-center -right-[10%] w-[400px] h-[400px] rounded-full bg-purple-200/40 dark:bg-purple-900/20 blur-[80px] -z-10">
    </div>
    <div
      class="absolute bottom-[10%] -left-[10%] w-[400px] h-[400px] rounded-full bg-pink-200/40 dark:bg-pink-900/20 blur-[80px] -z-10">
    </div>

    <div
      class="max-w-2xl w-full bg-white dark:bg-gray-800 rounded-3xl p-8 shadow-2xl border border-gray-100 dark:border-gray-700 relative z-10">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold font-heading text-gray-900 dark:text-white mb-2">Join as a Professional</h2>
        <p class="text-gray-500 dark:text-gray-400 text-sm">Grow your business and connect with customers locally.</p>
      </div>

      <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Column 1: Personal Info -->
        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
            <div class="relative">
              <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="text" id="name" placeholder="John Doe" required
                class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
            <div class="relative">
              <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="email" id="email" placeholder="you@example.com" required
                class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="password" id="password" placeholder="••••••••" required
                class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Phone Number</label>
            <div class="relative">
              <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="text" id="phone" placeholder="+1 (555) 000-0000" required
                class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
          </div>
        </div>

        <!-- Column 2: Professional Details -->
        <div class="space-y-5">

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Years of Experience</label>
            <div class="relative">
              <i class="fas fa-briefcase absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="number" id="experience_years" placeholder="0" min="0" required
                class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Main Profession</label>
            <div class="relative">
              <i class="fas fa-tools absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="text" id="main_profession" placeholder="e.g., Plumber, Electrician" required
                class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Short Bio</label>
            <textarea id="bio" placeholder="Describe your skills and services..." rows="4"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-purple-500 outline-none transition-all dark:text-white placeholder-gray-400"></textarea>
          </div>
        </div>

        <div class="md:col-span-2 mt-4 space-y-4">
          <button type="submit"
            class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 transition-all shadow-md hover:shadow-xl transform hover:-translate-y-0.5">
            Submit Application
          </button>

          <p id="message" class="text-center text-sm font-medium"></p>

          <p class="text-center text-sm text-gray-500 dark:text-gray-400">
            Already have an account? <a href="/login.html"
              class="text-purple-600 dark:text-purple-400 hover:underline font-semibold">Log In</a>
          </p>
        </div>
      </form>

    </div>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value,
        experience_years: parseInt(document.getElementById('experience_years').value, 10),
        main_profession: document.getElementById('main_profession').value,
        bio: document.getElementById('bio').value
      };

      const messageEl = document.getElementById('message');
      messageEl.textContent = 'Creating provider account...';
      messageEl.className = 'text-center text-sm font-medium text-gray-500 dark:text-gray-400';

      try {
        const response = await fetch('/auth/register/provider', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          messageEl.className = 'text-center text-sm font-medium text-green-600 dark:text-green-400';
          messageEl.textContent = `Success! Account created. Redirecting...`;
          setTimeout(() => window.location.href = '/login.html', 1500);
        } else {
          messageEl.className = 'text-center text-sm font-medium text-red-600 dark:text-red-400';
          messageEl.textContent = data.message || 'Registration failed';
        }
      } catch (err) {
        messageEl.className = 'text-center text-sm font-medium text-red-600 dark:text-red-400';
        messageEl.textContent = 'Network error occurred';
      }
    });
  </script>
</body>

</html>
