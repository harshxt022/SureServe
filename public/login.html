<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SureServe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="/js/theme.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    .font-heading {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>

<body
  class="bg-[#FAFAFC] dark:bg-gray-900 text-gray-800 dark:text-gray-200 antialiased min-h-screen flex flex-col transition-colors duration-300">
  <!-- Minimal Nav -->
  <nav class="w-full p-4 flex justify-between items-center absolute top-0 left-0 right-0 z-10">
    <a href="/" class="flex items-center gap-2 group cursor-pointer text-gray-900 dark:text-white px-4">
      <div
        class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-white shadow-lg group-hover:rotate-12 transition-transform duration-300">
        <i class="fas fa-home text-lg"></i>
      </div>
      <span class="text-2xl font-bold font-heading tracking-tight">SureServe</span>
    </a>
    <button onclick="toggleDarkMode()"
      class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors px-4"
      aria-label="Toggle Dark Mode">
      <i class="theme-toggle-icon fas fa-moon text-xl"></i>
    </button>
  </nav>

  <!-- Login Form -->
  <main class="flex-grow flex items-center justify-center p-4 pt-24 relative overflow-hidden">
    <!-- Decorative -->
    <div
      class="absolute -top-[10%] -right-[10%] w-[400px] h-[400px] rounded-full bg-blue-200/40 dark:bg-blue-900/20 blur-[80px] -z-10">
    </div>
    <div
      class="absolute bottom-[10%] -left-[10%] w-[400px] h-[400px] rounded-full bg-purple-200/40 dark:bg-purple-900/20 blur-[80px] -z-10">
    </div>

    <div
      class="max-w-md w-full bg-white dark:bg-gray-800 rounded-3xl p-8 shadow-2xl border border-gray-100 dark:border-gray-700 relative z-10">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold font-heading text-gray-900 dark:text-white mb-2">Welcome Back</h2>
        <p class="text-gray-500 dark:text-gray-400 text-sm">Enter your credentials to access your account</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">I am a</label>
          <select id="role"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white">
            <option value="user">Customer</option>
            <option value="provider">Service Provider</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" id="email" placeholder="you@example.com" required
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="password" placeholder="••••••••" required
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
          </div>
        </div>

        <button type="submit"
          class="w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 transition-all shadow-md hover:shadow-xl transform hover:-translate-y-0.5">
          Sign In
        </button>
      </form>

      <p id="message" class="mt-4 text-center text-sm font-medium"></p>

      <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
        Don't have an account? <br class="sm:hidden">
        <a href="/register-user.html" class="text-blue-600 dark:text-blue-400 hover:underline font-semibold">User
          Signup</a> or
        <a href="/register-provider.html"
          class="text-purple-600 dark:text-purple-400 hover:underline font-semibold">Provider Signup</a>
      </p>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const role = document.getElementById('role').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');

      messageEl.textContent = 'Logging in...';
      messageEl.className = 'mt-4 text-center text-sm font-medium text-gray-500 dark:text-gray-400';

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        });

        const data = await response.json();

        if (response.ok) {
          messageEl.className = 'mt-4 text-center text-sm font-medium text-green-600 dark:text-green-400';
          messageEl.textContent = `Success! Welcome back ${data.name}. Redirecting...`;
          setTimeout(() => window.location.href = '/', 1500);
        } else {
          messageEl.className = 'mt-4 text-center text-sm font-medium text-red-600 dark:text-red-400';
          messageEl.textContent = data.message || 'Login failed';
        }
      } catch (err) {
        messageEl.className = 'mt-4 text-center text-sm font-medium text-red-600 dark:text-red-400';
        messageEl.textContent = 'Network error occurred';
      }
    });
  </script>
</body>

</html>
